<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cinévia</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">
    <h2 class="logo">Cinévia</h2>
    <nav>
      <a href="#hero">Accueil</a>
      <a href="#movies">Films</a>
      <a href="#favoris">Favoris</a>
    </nav>
    <input type="text" placeholder="Recherche...">
  </header>

  <!-- Hero -->
  <section id="hero" class="hero">
    <div class="overlay">
      <h1>Bienvenue sur Cinévia</h1>
      <p>Découvre les meilleurs films</p>
      <a href="#movies">Choisir Film</a>
    </div>
  </section>

  <!-- Filtres -->
  <div class="filters">
    <button class="active" data-filter="tous">Tous</button>
    <button data-filter="action">Action</button>
    <button data-filter="drama">Drama</button>
  </div>

  <!-- Section Action -->
  <section id="movies" class="movies" data-section="action">
    <h2>Action</h2>
    <div class="cards" id="action-container"></div>
  </section>

  <!-- Section Drama -->
  <section class="movies" data-section="drama">
    <h2>Drama</h2>
    <div class="cards" id="drama-container"></div>
  </section>

  <!-- Favoris -->
  <section id="favoris" class="movies">
    <h2>⭐ Mes Favoris</h2>
    <div class="cards" id="favoris-container"></div>
  </section>

  <!-- Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">

      <span id="close-modal">X</span>

      <img id="modal-img" alt="movie">

      <div class="modal-info">

        <div class="modal-top">
          <h2 id="modal-title"></h2>
          <span id="modal-cat"></span>
          <p id="modal-desc"></p>
        </div>

        <div class="modal-bottom">
          <button class="btn-fav-modal" id="modal-btn-fav">
            ♥ Ajouter aux favoris
          </button>
        </div>

      </div>
    </div>
  </div>

  <footer>© 2026 Cinévia</footer>

  <script src="script.js"></script>
</body>
</html>
