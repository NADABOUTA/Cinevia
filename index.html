<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cinévia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2 class="logo">Cinévia</h2>
  <nav>
    <a href="#hero">Accueil</a>
    <a href="#movies">Films</a>
    <a href="#favoris">Favoris</a>
  </nav>
  <input type="text" placeholder="Recherche...">
</header>

<!-- HERO -->
<section id="hero" class="hero">
  <div class="overlay">
    <h1>Bienvenue sur Cinévia</h1>
    <p>Découvre les meilleurs films</p>
    <button>Choisir Film</button>
  </div>
</section>

<!-- FILTER -->
<div  class="filters">
  <button class="active">Tous</button>
  <button>Action</button>
  <button>Comédie</button>
  <button>Drama</button>
</div>

<!-- SECTION ACTION -->
<section id="movies" class="movies">
  <h2>Action</h2>
  <div class="cards">

    <div class="card">
      <img src="images/FILM3.jfif">
      <h3>La casa de papel</h3>
      <p>Mes Favoris</p>
      <a href="Detail.html">Voir plus</a>
    </div>

    <div class="card">
      <img src="images/film1.jpg">
      <h3>Dune</h3>
      <p>Mes Favoris</p>
      <a href="Detail.html">Voir plus</a>
    </div>

    

  </div>
</section>

<!-- DRAMA -->
<section class="movies">
  <h2>Drama</h2>
  <div class="cards">
    <div class="card">
      <img src="images/film1.jpg">
      <h3>La casa de papel</h3>
      <p>Mes Favoris</p>
      <a href="Detail.html">Voir plus</a>
    </div>
  </div>
</section>

<!-- FAVORIS -->
<section id="favoris" class="movies">
  <h2>⭐ Mes Favoris</h2>
  <div class="cards">
    <div class="card small">
      <img src="images/FILM 5.webp">
      <h3>La casa de papel</h3>
      <a href="#">Supprimer</a>
    </div>
  </div>
</section>

<footer>
  © 2026 Cinévia - Tous droits réservés
</footer>

</html>
